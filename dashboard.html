<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aethera Private Bank | Complete Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Manrope:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0A0F1A;
            --bg-card: #111827;
            --accent-gold: #C9A03D;
            --accent-gold-light: #DFB760;
            --text-primary: #F3F4F6;
            --text-secondary: #9CA3AF;
            --text-muted: #6B7280;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --border: #1F2937;
            --hover-bg: rgba(201, 160, 61, 0.1);
            --transition: all 0.2s ease;
            --header-overlay-offset: clamp(88px, 11vw, 120px);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #111827;
            overflow-x: hidden;
        }

        /* Dashboard App */
        .dashboard-app {
            display: none;
            min-height: 100vh;
            background: #ffffff;
            color: #111827;
            --bg-card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-muted: #6B7280;
            --border: #D1D5DB;
            --hover-bg: rgba(201, 160, 61, 0.12);
        }

        .dashboard-hero {
            min-height: auto;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.40) 55%, rgba(255,255,255,0.92) 92%), url('https://plus.unsplash.com/premium_photo-1746025616326-b205e7be5aa0?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-start;
            padding: calc(44px + var(--header-overlay-offset)) clamp(18px, 4vw, 72px) 1.25rem;
            position: relative;
            overflow: hidden;
        }

        .dashboard-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.86));
            pointer-events: none;
        }

        .dashboard-hero-inner {
            position: relative;
            width: 100%;
            max-width: none;
            margin: 0;
            z-index: 1;
        }

        .dashboard-hero-copy {
            max-width: 720px;
            color: #111827;
        }

        .dashboard-hero-copy h1 {
            font-size: clamp(2.3rem, 4vw, 4rem);
            line-height: 1.02;
            letter-spacing: -0.03em;
            margin-bottom: 0.8rem;
        }

        .dashboard-hero-copy p {
            font-size: 1rem;
            line-height: 1.7;
            max-width: 46rem;
            color: #1f2937;
        }

        /* Main Content */
        .main-content {
            padding: 0 clamp(18px, 4vw, 72px) 3rem;
            background: #ffffff;
            margin-top: 0;
            position: relative;
            z-index: 2;
        }

        .pages-wrap {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .dashboard-footer-nav {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(201, 160, 61, 0.15);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem 1.75rem;
        }

        .nav-item {
            color: #4B5563;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            line-height: 1.7;
            letter-spacing: 0.02em;
            text-decoration: none;
            background: transparent;
            border: 0;
            padding: 0;
            cursor: pointer;
            transition: color 0.2s ease, opacity 0.2s ease;
        }

        .nav-item:hover {
            color: var(--accent-gold-light);
        }

        .nav-item.active {
            color: var(--accent-gold);
        }

        .nav-item.sign-out {
            opacity: 0.9;
        }

        /* Page Container */
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active-page {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards & Grids */
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--accent-gold);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        /* Account Cards */
        .account-card {
            background: transparent;
            border-radius: 20px;
            padding: 1.5rem;
            border: none;
        }

        .account-activity-section {
            background: transparent;
            border: none;
            padding: 1.5rem 0 0;
            box-shadow: none;
        }

        .account-summary-panel {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            display: grid;
            gap: 1.5rem;
            color: #111827;
            backdrop-filter: none;
        }

        .account-summary-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.15rem;
        }

        .account-summary-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .account-summary-title-row {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .verified-badge-water {
            color: #3897f0;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
        }

        .verified-badge-water svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: currentColor;
        }

        .account-summary-status {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            font-size: 0.95rem;
            color: #111827;
            margin: 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #10B981;
            color: #ffffff;
            font-size: 0.8rem;
        }

        .account-summary-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .account-summary-badge {
            background: rgba(17,24,39,0.04);
            border: 1px solid rgba(17,24,39,0.08);
            border-radius: 999px;
            padding: 0.55rem 0.9rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .account-summary-heading {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .account-summary-heading p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .account-summary-partner {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .account-summary-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 1rem;
            flex-wrap: nowrap;
        }

        .motion-button-wrapper {
            transition: transform 0.2s ease;
        }

        .motion-button-wrapper:hover {
            transform: translateY(-1px);
        }

        .dashboard-motion-button {
            position: relative;
            width: 12rem;
            height: auto;
            padding: 0.25rem;
            border: none;
            border-radius: 9999px;
            background: #ffffff;
            cursor: pointer;
            outline: none;
            transition: box-shadow 0.2s ease;
        }

        .dashboard-motion-button:hover {
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
        }

        .dashboard-motion-button:focus-visible {
            outline: 2px solid #111827;
            outline-offset: 2px;
        }

        .dashboard-motion-button-circle {
            display: block;
            width: 3rem;
            height: 3rem;
            margin: 0;
            overflow: hidden;
            border-radius: 9999px;
            background: #111827;
            transition: width 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .dashboard-motion-button:hover .dashboard-motion-button-circle {
            width: 100%;
        }

        .dashboard-motion-button-icon {
            position: absolute;
            top: 50%;
            left: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-50%);
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: #ffffff;
        }

        .dashboard-motion-button:hover .dashboard-motion-button-icon {
            transform: translate(0.4rem, -50%);
        }

        .dashboard-motion-button-icon svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        .dashboard-motion-button-text {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-left: 1rem;
            transform: translate(-50%, -50%);
            color: #111827;
            font-family: 'Manrope', 'Inter', sans-serif;
            font-size: 1.125rem;
            font-weight: 500;
            line-height: 1.75rem;
            letter-spacing: -0.025em;
            text-align: center;
            white-space: nowrap;
            transition: color 0.3s ease, transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .dashboard-motion-button:hover .dashboard-motion-button-text {
            color: #ffffff;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 1rem;
        }

        .summary-card {
            background: transparent;
            border-radius: 24px;
            padding: 1.2rem 1.25rem;
            border: none;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 0 36px rgba(255,255,255,0.22);
        }

        .summary-card h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #111827;
            margin-bottom: 0.85rem;
            text-shadow: 0 0 18px rgba(255,255,255,0.42), 0 3px 10px rgba(255,255,255,0.28);
        }

        .summary-card .summary-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.9rem;
            color: #111827;
            text-shadow: 0 0 22px rgba(255,255,255,0.5), 0 4px 14px rgba(255,255,255,0.32);
        }

        .summary-card .summary-subtext {
            font-size: 0.83rem;
            color: #111827;
            line-height: 1.55;
            text-shadow: 0 0 16px rgba(255,255,255,0.42), 0 3px 10px rgba(255,255,255,0.26);
        }

        .summary-subtext-icon {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .summary-subtext-icon i {
            width: 16px;
            height: 16px;
            color: var(--accent-gold);
        }

        .lease-progress-panel {
            margin-top: 1rem;
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
            gap: 1rem;
            align-items: stretch;
        }

        .lease-panel-card {
            background: transparent;
            border: none;
            border-radius: 24px;
            padding: 1.25rem;
        }

        .lease-panel-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 1.35rem;
        }

        .lease-progress-layout {
            display: grid;
            grid-template-columns: 130px minmax(0, 1fr);
            gap: 2.75rem;
            align-items: start;
        }

        .lease-progress-ring {
            width: 136px;
            height: 136px;
            border-radius: 50%;
            background: conic-gradient(#2f9e44 0deg 360deg, rgba(47,158,68,0.14) 360deg);
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .lease-progress-ring::before {
            content: "";
            width: 118px;
            height: 118px;
            border-radius: 50%;
            background: #ffffff;
            border: 1px solid rgba(47,158,68,0.15);
            grid-area: 1 / 1;
        }

        .lease-progress-content {
            grid-area: 1 / 1;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1;
            transform: translateY(1px);
        }

        .lease-progress-percent {
            font-size: 1.05rem;
            font-weight: 700;
            color: #111827;
        }

        .lease-progress-days {
            margin-top: 0.35rem;
            font-size: 0.78rem;
            font-weight: 700;
            color: #2f9e44;
        }

        .lease-progress-caption {
            margin-top: 0.28rem;
            font-size: 0.56rem;
            color: var(--text-muted);
            line-height: 1.25;
        }

        .lease-progress-list {
            display: grid;
            gap: 0.85rem;
            padding-top: 0;
        }

        .lease-progress-item {
            display: grid;
            grid-template-columns: 22px minmax(0, 1fr) auto;
            gap: 0.75rem;
            align-items: center;
            padding-bottom: 0.85rem;
            border-bottom: 1px solid rgba(17,24,39,0.08);
        }

        .lease-progress-item:last-of-type {
            border-bottom: none;
            padding-bottom: 0;
        }

        .lease-progress-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(47,158,68,0.12);
            color: #2f9e44;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .lease-progress-icon i {
            width: 13px;
            height: 13px;
        }

        .lease-progress-label {
            font-size: 0.85rem;
            color: #374151;
            font-weight: 500;
        }

        .lease-progress-date {
            font-size: 0.85rem;
            color: #6b7280;
            white-space: nowrap;
        }

        .lease-progress-date.is-success {
            color: #2f9e44;
            font-weight: 700;
        }

        .payment-breakdown-list {
            display: grid;
            gap: 0.85rem;
            padding-top: 2.45rem;
        }

        .payment-breakdown-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0 0 0.85rem;
            border-bottom: 1px solid rgba(17,24,39,0.08);
        }

        .payment-breakdown-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .payment-breakdown-label {
            font-size: 0.84rem;
            color: #4b5563;
        }

        .payment-breakdown-label.is-green {
            color: #2f9e44;
            font-weight: 600;
        }

        .payment-breakdown-label.is-orange {
            color: #f97316;
            font-weight: 600;
        }

        .payment-breakdown-value {
            font-size: 1rem;
            font-weight: 700;
            color: #111827;
            white-space: normal;
            text-align: right;
        }

        .payment-breakdown-value.is-green {
            color: #2f9e44;
        }

        .payment-breakdown-value.is-orange {
            color: #f97316;
        }

        .account-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-gold);
        }

        .account-number {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: monospace;
            margin: 0.3rem 0;
        }

        .account-balance {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        /* Transaction Table */
        .transaction-table {
            width: 100%;
            border-collapse: collapse;
        }

        .transaction-table th, .transaction-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .transaction-table th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .amount-positive {
            color: var(--success);
        }

        .amount-negative {
            color: var(--danger);
        }

        /* Transaction Type (Credit/Debit) */
        .txn-type {
            display:flex;
            align-items:center;
            gap:0.5rem;
            font-size:0.9rem;
        }
        .txn-icon {
            display:inline-flex;
            align-items:center;
            justify-content:center;
            width:28px;
            height:24px;
            border-radius:6px;
        }
        .txn-icon.credit {
            color: var(--success);
            background: rgba(16,185,129,0.06);
            border: 1px solid rgba(16,185,129,0.12);
        }
        .txn-icon.debit {
            color: var(--danger);
            background: rgba(239,68,68,0.04);
            border: 1px solid rgba(239,68,68,0.10);
        }

        /* Beneficiary List */
        .beneficiary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* Holdings */
        .holding-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .holding-bar {
            background: var(--bg-dark);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-top: 0.3rem;
        }

        .holding-fill {
            height: 100%;
            background: var(--accent-gold);
            width: 0%;
        }

        /* Card Styles */
        .physical-card {
            background: linear-gradient(135deg, #1A1F2E, #0D1322);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .card-chip {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .card-number {
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* Document List */
        .doc-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* Profile Form */
        .profile-form input, .profile-form select {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn-primary {
            background: var(--accent-gold);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .btn-outline:hover {
            border-color: var(--accent-gold);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .grid-4, .grid-3 {
                grid-template-columns: repeat(2, 1fr);
            }
            .account-summary-panel {
                padding: 0;
            }
            .summary-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .main-content {
                padding: 0 24px 2rem;
            }
            .dashboard-footer-nav {
                justify-content: flex-start;
                flex-wrap: wrap;
            }
            .lease-progress-panel {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1000px) {
            .grid-4, .grid-3 {
                grid-template-columns: repeat(2, 1fr);
            }
            .summary-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 700px) {
            .grid-4, .grid-3, .grid-2 {
                grid-template-columns: 1fr;
            }
            .summary-grid {
                grid-template-columns: 1fr;
            }
            .main-content {
                padding: 0 14px 2.5rem;
            }
            .account-summary-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .account-summary-actions {
                width: 100%;
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.6rem;
            }
            .dashboard-motion-button {
                width: 100%;
            }
            .dashboard-motion-button-circle {
                width: 2.2rem;
                height: 2.2rem;
            }
            .dashboard-motion-button-icon {
                left: 0.7rem;
            }
            .dashboard-motion-button-icon svg {
                width: 1rem;
                height: 1rem;
            }
            .dashboard-motion-button-text {
                margin-left: 0.35rem;
                font-size: 0.72rem;
                line-height: 1.1rem;
            }
            .lease-progress-ring {
                display: none;
            }
            .lease-progress-layout {
                display: block;
            }
            .lease-progress-list,
            .payment-breakdown-list {
                padding-top: 0;
            }
            .payment-breakdown-row {
                align-items: flex-start;
            }
            .payment-breakdown-value {
                max-width: 48%;
            }
        }

        @media (max-width: 900px) and (orientation: landscape) {
            .dashboard-hero {
                padding: calc(44px + var(--header-overlay-offset)) 14px 1rem;
            }
            .main-content {
                padding: 0 14px 1.5rem;
            }
            .summary-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .lease-progress-panel {
                grid-template-columns: 1fr;
            }
            .payment-breakdown-row {
                gap: 0.75rem;
            }
            .payment-breakdown-value {
                max-width: 50%;
            }
        }

        @media (max-width: 520px) {
            .dashboard-hero {
                padding: calc(44px + var(--header-overlay-offset)) 14px 1rem;
            }
            .main-content {
                padding: 0 14px 1.5rem;
            }
            .card {
                border-radius: 16px;
                padding: 1rem;
            }
            .section-title {
                font-size: 1rem;
            }
            .account-card {
                padding: 1rem;
            }
            .transaction-table {
                width: 100%;
                display: block;
            }
            .transaction-table thead {
                display: none;
            }
            .transaction-table tbody {
                display: block;
            }
            .transaction-table tr {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 0.45rem 0.8rem;
                padding: 0.9rem 0;
                border-bottom: 1px solid var(--border);
            }
            .transaction-table td {
                padding: 0;
                font-size: 0.82rem;
                white-space: normal;
                border-bottom: none;
                min-width: 0;
            }
            .transaction-table td:nth-child(1) {
                grid-column: 1;
                grid-row: 1;
                font-weight: 600;
            }
            .transaction-table td:nth-child(2) {
                grid-column: 2;
                grid-row: 1;
                text-align: right;
            }
            .transaction-table td:nth-child(2) .txn-type {
                justify-content: flex-end;
                font-size: 0.8rem;
            }
            .transaction-table td:nth-child(2) .txn-type span:last-child {
                display: none;
            }
            .transaction-table td:nth-child(3) {
                grid-column: 1 / -1;
                grid-row: 2;
                font-size: 0.92rem;
                font-weight: 700;
            }
            .transaction-table td:nth-child(4) {
                grid-column: 1;
                grid-row: 3;
                min-width: 0;
            }
            .transaction-table td:nth-child(5) {
                grid-column: 2;
                grid-row: 3;
                text-align: right;
                overflow-wrap: anywhere;
            }
            .txn-type {
                gap: 0.35rem;
                font-size: 0.85rem;
            }
            .txn-icon {
                width: 24px;
                height: 20px;
            }
            .dashboard-footer-nav {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
            }
            .nav-item {
                width: 100%;
                justify-content: center;
            }
            .lease-progress-item,
            .payment-breakdown-row {
                grid-template-columns: 1fr;
                display: grid;
                gap: 0.35rem;
            }
            .lease-progress-date {
                white-space: normal;
            }
            .payment-breakdown-value {
                max-width: none;
                text-align: left;
            }
        }
    </style>
</head>
<body>

<!-- Dashboard App -->
<div class="dashboard-app" id="dashboardApp">
<!-- ========== HEADER ========== -->
<trafficabuja-header
  logo-src="logo.png"
  brand="trafficabuja"
  page-title="trafficabuja"
  personalize-href="overlay.html"
  nav-mode="stacked-links"
  scroll-mode="overlay"
  overlay-text-color="#000000"
  overlay-muted-color="rgba(0,0,0,0.72)"
  solid-background="rgba(255,255,255,0.96)"
  solid-text-color="#000000"
  solid-muted-color="#64748b"
  products-href="#"
  about-label="About"
  about-href="faq.html"
  blog-href="#"
  contact-href="#"
  privacy-href="#"
  terms-href="#"
></trafficabuja-header>

<!-- ========== END HEADER ========== -->
<div class="dashboard-hero">
    <div class="dashboard-hero-inner" id="accountsList"></div>
</div>
    <!-- Main Content -->
    <div class="main-content">
        <div class="pages-wrap">
        <!-- ==================== ACCOUNTS PAGE ==================== -->
        <div id="page-accounts" class="page active-page">
            <div class="card account-activity-section" style="margin-top:1.5rem;">
                <h3 style="margin-bottom:1rem;">History</h3>
                <table class="transaction-table" id="accountTransactionsTable">
                    <thead>
                        <tr><th>Date</th><th>Type</th><th>Amount</th><th>Description</th><th>Reference</th></tr>
                    </thead>
                    <tbody id="accountTransactionsBody"></tbody>
                </table>
            </div>
        </div>
        <!-- ==================== PROFILE PAGE ==================== -->
        <div id="page-profile" class="page">
            <div class="grid-2">
                <div class="card">
                    <h3>Personal Information</h3>
                    <div class="profile-form">
                        <label>Full Name</label>
                        <input type="text" id="profileName" value="William Reynolds">
                        <label>Email Address</label>
                        <input type="email" id="profileEmail" value="william.reynolds@aethera.com">
                        <label>Phone Number</label>
                        <input type="tel" id="profilePhone" value="+41 79 123 45 67">
                        <label>Address</label>
                        <input type="text" id="profileAddress" value="Bahnhofstrasse 12, 8001 Zurich, Switzerland">
                        <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
                    </div>
                </div>
                <div class="card">
                    <h3>Security Settings</h3>
                    <div style="margin-bottom:1rem;">
                        <label>Two-Factor Authentication</label>
                        <div style="display:flex; justify-content:space-between; margin-top:0.5rem;">
                            <span>Status: <span style="color:var(--success);">Enabled</span></span>
                            <button class="btn-outline" onclick="alert('2FA settings')">Manage</button>
                        </div>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label>Change Password</label>
                        <button class="btn-outline" style="margin-top:0.5rem; width:100%;" onclick="alert('Password change initiated')">Update Password</button>
                    </div>
                    <div>
                        <label>Session Management</label>
                        <button class="btn-outline" style="margin-top:0.5rem; width:100%;" onclick="alert('Logged out of all devices')">Logout All Devices</button>
                    </div>
                </div>
            </div>
            <div class="card" style="margin-top:1.5rem;">
                <h3>Notification Preferences</h3>
                <div style="display:flex; justify-content:space-between; padding:1rem 0; border-bottom:1px solid var(--border);">
                    <span>Email Alerts for Transactions</span>
                    <input type="checkbox" checked style="width:20px; height:20px;">
                </div>
                <div style="display:flex; justify-content:space-between; padding:1rem 0; border-bottom:1px solid var(--border);">
                    <span>SMS for Large Transfers (>$50,000)</span>
                    <input type="checkbox" checked style="width:20px; height:20px;">
                </div>
                <div style="display:flex; justify-content:space-between; padding:1rem 0;">
                    <span>Weekly Portfolio Summary</span>
                    <input type="checkbox" checked style="width:20px; height:20px;">
                </div>
            </div>
        </div>
        </div>

        <div class="dashboard-footer-nav">
            <button class="nav-item active" type="button" data-page="accounts">Accounts</button>
            <button class="nav-item" type="button" data-page="profile">Profile</button>
            <button class="nav-item sign-out" type="button" onclick="logout()">Sign Out</button>
        </div>
    </div>
</div>

<script>
    // ==================== DEMO DATA ====================
    let balanceVisible = true;
    const allTransactions = [
        { date: "2025-03-14", desc: "Wire Transfer - Aethera London", amount: -1250000, balance: 42123456, reference: "TXN#4167314" },
        { date: "2025-03-12", desc: "Dividend - Aethera Capital", amount: 342000, balance: 43373456, reference: "TXN#4167305" },
        { date: "2025-03-10", desc: "Real Estate Distribution", amount: 890000, balance: 43031456, reference: "TXN#4167306" },
        { date: "2025-03-08", desc: "Private Jet Maintenance", amount: -187500, balance: 42141456, reference: "TXN#4167298" },
        { date: "2025-03-05", desc: "Art Purchase - Christie's", amount: -2450000, balance: 42328956, reference: "TXN#4111921" },
        { date: "2025-03-01", desc: "Interest - Swiss Bond", amount: 128750, balance: 44778956, reference: "TXN#4111537" },
        { date: "2025-02-25", desc: "Charitable Donation - Foundation", amount: -500000, balance: 44650206 },
        { date: "2025-02-20", desc: "Private Equity Distribution", amount: 2100000, balance: 45150206 }
    ];

    // ==================== UTILITY FUNCTIONS ====================
    function formatMoney(amount) {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(amount);
    }
    
    function formatDate(dateStr) {
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    
    // ==================== PAGE RENDERING ====================
    function renderAccounts() {
        const container = document.getElementById('accountsList');
        container.innerHTML = `
            <div class="account-summary-panel">
                <div class="account-summary-header">
                    <div class="account-summary-heading">
                        <div class="account-summary-title account-summary-title-row">
                            <span>Nixole LLC</span>
                            <i data-lucide="verified" class="verified-badge-water" aria-hidden="true"></i>
                        </div>
                        <p class="account-summary-partner">Partner since March 2025</p>
                    </div>
                    <div class="account-summary-actions">
                        <div class="motion-button-wrapper">
                            <button class="dashboard-motion-button" type="button">
                                <span class="dashboard-motion-button-circle" aria-hidden="true"></span>
                                <span class="dashboard-motion-button-icon" aria-hidden="true">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M5 12h14"></path>
                                        <path d="m12 5 7 7-7 7"></path>
                                    </svg>
                                </span>
                                <span class="dashboard-motion-button-text">Fund Account</span>
                            </button>
                        </div>
                        <div class="motion-button-wrapper">
                            <button class="dashboard-motion-button" type="button">
                                <span class="dashboard-motion-button-circle" aria-hidden="true"></span>
                                <span class="dashboard-motion-button-icon" aria-hidden="true">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M5 12h14"></path>
                                        <path d="m12 5 7 7-7 7"></path>
                                    </svg>
                                </span>
                                <span class="dashboard-motion-button-text">Place Order</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="summary-grid">
                    <div class="summary-card">
                        <h4>Balance</h4>
                        <div class="summary-value">$4,500.00</div>
                        <div class="summary-subtext">Available Funds</div>
                    </div>
                    <div class="summary-card">
                        <h4>Days Running</h4>
                        <div class="summary-value">01 of 30</div>
                        <div class="summary-subtext">$150.00 per day</div>
                    </div>
                    <div class="summary-card">
                        <h4>End Date</h4>
                        <div class="summary-value">
                            <span class="summary-subtext-icon"><i data-lucide="calendar-days" aria-hidden="true"></i><span>Saturday</span></span>
                        </div>
                        <div class="summary-subtext">May 16, 2026</div>
                    </div>
                    <div class="summary-card">
                        <h4>Weather</h4>
                        <div class="summary-value">
                            <span class="summary-subtext-icon"><i data-lucide="cloud-sun" aria-hidden="true"></i><span>90&deg;</span></span>
                        </div>
                        <div class="summary-subtext">Partly Cloudy</div>
                    </div>
                </div>
                <div class="lease-progress-panel">
                    <div class="lease-panel-card">
                        <div class="lease-panel-title">Lease Progress</div>
                        <div class="lease-progress-layout">
                            <div class="lease-progress-ring" aria-hidden="true">
                                <div class="lease-progress-content">
                                    <div class="lease-progress-percent">100%</div>
                                    <div class="lease-progress-days">30 / 30</div>
                                    <div class="lease-progress-caption">Days Completed</div>
                                </div>
                            </div>
                            <div>
                                <div class="lease-progress-list">
                                    <div class="lease-progress-item">
                                        <span class="lease-progress-icon"><i data-lucide="calendar-days" aria-hidden="true"></i></span>
                                        <span class="lease-progress-label">Start Date</span>
                                        <span class="lease-progress-date">May 20, 2025</span>
                                    </div>
                                    <div class="lease-progress-item">
                                        <span class="lease-progress-icon"><i data-lucide="badge-dollar-sign" aria-hidden="true"></i></span>
                                        <span class="lease-progress-label">Total Lease Amount</span>
                                        <span class="lease-progress-date">$9,000.00</span>
                                    </div>
                                    <div class="lease-progress-item">
                                        <span class="lease-progress-icon"><i data-lucide="badge-check" aria-hidden="true"></i></span>
                                        <span class="lease-progress-label">Status</span>
                                        <span class="lease-progress-date is-success">Payment made in full</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="lease-panel-card">
                        <div class="payment-breakdown-list">
                            <div class="payment-breakdown-row">
                                <span class="payment-breakdown-label is-green">Traffic in Vicinity: Yes</span>
                                <span class="payment-breakdown-value">Address: 23rd Wuye, FCT</span>
                            </div>
                            <div class="payment-breakdown-row">
                                <span class="payment-breakdown-label">Placement: Left Wing</span>
                                <span class="payment-breakdown-value is-orange">Reach: 500+ daily</span>
                            </div>
                            <div class="payment-breakdown-row">
                                <span class="payment-breakdown-label is-orange">Peak Hours: 4PM - 8PM</span>
                                <span class="payment-breakdown-value is-green">Pedestrian Activity: Yes</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        const tbody = document.getElementById('accountTransactionsBody');
        tbody.innerHTML = allTransactions.slice(0, 6).map(t => `
            <tr>
                <td>${formatDate(t.date)}</td>
                <td>
                    <div class="txn-type">
                        <span class="txn-icon ${t.amount > 0 ? 'credit' : 'debit'}"><i class="fas ${t.amount > 0 ? 'fa-arrow-down' : 'fa-arrow-up'}"></i></span>
                        <span style="color:var(--text-muted);">${t.amount > 0 ? 'Credit' : 'Debit'}</span>
                    </div>
                </td>
                <td class="${t.amount > 0 ? 'amount-positive' : 'amount-negative'}">${t.amount > 0 ? '+' : ''}${formatMoney(t.amount)}</td>
                <td>${t.desc}</td>
                <td>${t.reference ? t.reference : formatMoney(t.balance)}</td>
            </tr>
        `).join('');
    }

    // ==================== PAGE NAVIGATION ====================
    function switchPage(pageName) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
        document.getElementById(`page-${pageName}`).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-page="${pageName}"]`);
        if (activeNav) activeNav.classList.add('active');
    }
    
    // ==================== PROFILE ====================
    function saveProfile() {
        const name = document.getElementById('profileName').value;
        const greetingName = document.getElementById('greetingName');
        if (greetingName) {
            greetingName.innerHTML = `Welcome back, ${name.split(' ')[0]}`;
        }
        alert('Profile updated successfully');
    }
    // ==================== AUTO-START DASHBOARD ====================
document.addEventListener('DOMContentLoaded', function() {
    // Hide login overlay if it exists
    const overlay = document.getElementById('loginOverlay');
    if (overlay) overlay.style.display = 'none';
    
    // Show dashboard
    document.getElementById('dashboardApp').style.display = 'block';
    
    // Render all content
    renderAccounts();
    if (window.lucide) window.lucide.createIcons();
    switchPage('accounts');
    
    // Setup navigation
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.getAttribute('data-page');
            if (page) switchPage(page);
        });
    });
});
</script>
<script src="components/trafficabuja-header.js"></script>
</body>
</html>
