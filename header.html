<style>
  body {
    padding-top: 110px;
  }

  .trafficabuja-header-shell {
    --trafficabuja-header-text-color: #000000;
    --trafficabuja-header-muted-color: rgba(0, 0, 0, 0.72);
    width: 100%;
    padding: 1rem 4rem 0;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: transparent;
    transition: background-color 0.25s ease, box-shadow 0.25s ease, backdrop-filter 0.25s ease, border-color 0.25s ease;
  }

  .trafficabuja-header-shell--scrolled {
    --trafficabuja-header-text-color: #000000;
    --trafficabuja-header-muted-color: #64748b;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
  }

  .trafficabuja-header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    padding: 0.5rem 0;
    margin: 0 auto 0.9rem;
    max-width: 1320px;
  }

  .trafficabuja-header-wordmark {
    flex: 0 1 auto;
    text-align: left;
    font-family: "Pacifico", cursive;
    font-size: clamp(1.8rem, 4vw, 3.3rem);
    line-height: 1;
    color: var(--trafficabuja-header-text-color);
    letter-spacing: 0.01em;
    white-space: nowrap;
    margin-right: auto;
    transition: color 0.2s ease;
  }

  .trafficabuja-header-stacked-nav {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.25rem;
    margin-left: auto;
  }

  .trafficabuja-header-link-row {
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin: 0;
    padding: 0;
  }

  .trafficabuja-header-link-row--primary {
    gap: 1rem;
  }

  .trafficabuja-header-link-row--secondary {
    gap: 1.5rem;
    padding-right: 0.2rem;
  }

  .trafficabuja-header-link {
    color: var(--trafficabuja-header-text-color);
    text-decoration: none;
    transition: color 0.2s ease, background-color 0.2s ease;
    border-radius: 999px;
    padding: 0.15rem 0.2rem;
    white-space: nowrap;
  }

  .trafficabuja-header-link:hover,
  .trafficabuja-header-link:focus-visible {
    color: #5865f2;
    outline: none;
  }

  .trafficabuja-header-link--primary {
    font-size: 0.92rem;
    font-weight: 500;
  }

  .trafficabuja-header-link--secondary {
    font-size: 0.86rem;
    color: var(--trafficabuja-header-muted-color);
  }

  @media (max-width: 768px) {
    body {
      padding-top: 100px;
    }

    .trafficabuja-header-shell {
      padding: 0.85rem 2rem 0;
    }

    .trafficabuja-header-inner {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .trafficabuja-header-wordmark {
      flex: 0 1 auto;
      text-align: left;
      font-size: clamp(1.2rem, 6vw, 2rem);
      margin-right: auto;
    }

    .trafficabuja-header-stacked-nav {
      gap: 0.2rem;
    }

    .trafficabuja-header-link-row--primary {
      gap: 0.75rem;
    }

    .trafficabuja-header-link-row--secondary {
      gap: 1rem;
      padding-right: 0;
    }

    .trafficabuja-header-link--primary {
      font-size: 0.84rem;
    }

    .trafficabuja-header-link--secondary {
      font-size: 0.78rem;
    }
  }
</style>

<header class="trafficabuja-header-shell trafficabuja-header-shell--overlay" aria-label="Site header">
  <div class="trafficabuja-header-inner">
    <div class="trafficabuja-header-wordmark" aria-label="trafficabuja brand name">trafficabuja</div>
    <nav class="trafficabuja-header-stacked-nav" aria-label="Header navigation">
      <ul class="trafficabuja-header-link-row trafficabuja-header-link-row--primary">
        <li><a class="trafficabuja-header-link trafficabuja-header-link--primary" href="#">Products</a></li>
        <li><a class="trafficabuja-header-link trafficabuja-header-link--primary" href="faq.html">About</a></li>
        <li><a class="trafficabuja-header-link trafficabuja-header-link--primary" href="#">Blog</a></li>
        <li><a class="trafficabuja-header-link trafficabuja-header-link--primary" href="#">Contact</a></li>
      </ul>
      <ul class="trafficabuja-header-link-row trafficabuja-header-link-row--secondary">
        <li><a class="trafficabuja-header-link trafficabuja-header-link--secondary" href="#">Privacy</a></li>
        <li><a class="trafficabuja-header-link trafficabuja-header-link--secondary" href="#">Terms</a></li>
      </ul>
    </nav>
  </div>
</header>
