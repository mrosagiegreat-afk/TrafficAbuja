<style>
  :host {
    display: block;
  }

  .trafficabuja-header-shell {
    --trafficabuja-header-text-color: #000000;
    --trafficabuja-header-muted-color: rgba(100, 116, 139, 0.8);
    width: 100%;
    padding: 1rem 4rem 0;
    position: relative;
    z-index: 1000;
    transition: background-color 0.25s ease, box-shadow 0.25s ease, backdrop-filter 0.25s ease, border-color 0.25s ease;
  }

  .trafficabuja-header-shell--overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: transparent;
  }

  .trafficabuja-header-shell--overlay.trafficabuja-header-shell--scrolled {
    --trafficabuja-header-text-color: var(--trafficabuja-header-solid-text-color, #000000);
    --trafficabuja-header-muted-color: var(--trafficabuja-header-solid-muted-color, #64748b);
    background: var(--trafficabuja-header-solid-background, rgba(255,255,255,0.96));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
  }

  .trafficabuja-header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    padding: 0.5rem 0;
    margin: 0 auto 0.9rem;
  }

  .trafficabuja-header-wordmark {
    flex: 0 1 auto;
    text-align: left;
    font-family: "Pacifico", cursive;
    font-size: clamp(1.8rem, 4vw, 3.3rem);
    line-height: 1;
    color: var(--trafficabuja-header-text-color);
    letter-spacing: 0.01em;
    white-space: nowrap;
    margin-right: auto;
    transition: color 0.2s ease;
  }

  .trafficabuja-header-nav {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    flex-wrap: wrap;
    justify-content: flex-end;
    margin-left: auto;
  }

  .trafficabuja-header-stacked-nav {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.25rem;
    margin-left: auto;
  }

  .trafficabuja-header-link-row {
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin: 0;
    padding: 0;
  }

  .trafficabuja-header-link-row--primary {
    gap: 1rem;
  }

  .trafficabuja-header-link-row--secondary {
    gap: 1.5rem;
    padding-right: 0.2rem;
  }

  .trafficabuja-header-link {
    color: var(--trafficabuja-header-text-color);
    text-decoration: none;
    transition: color 0.2s ease, background-color 0.2s ease;
    border-radius: 999px;
    padding: 0.15rem 0.2rem;
    white-space: nowrap;
  }

  .trafficabuja-header-link:hover,
  .trafficabuja-header-link:focus-visible {
    color: #5865f2;
    outline: none;
  }

  .trafficabuja-header-link--primary {
    font-size: 0.92rem;
    font-weight: 500;
  }

  .trafficabuja-header-link--secondary {
    font-size: 0.86rem;
    color: var(--trafficabuja-header-muted-color);
  }

  .trafficabuja-header-action {
    width: auto;
    min-height: 40px;
    padding: 0.55rem 0.9rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    box-shadow: none;
    transition: color 0.2s ease, background-color 0.2s ease;
    color: var(--trafficabuja-header-text-color);
    cursor: pointer;
    border-radius: 999px;
    font: inherit;
    font-size: 0.92rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    gap: 0.5rem;
    white-space: nowrap;
  }

  .trafficabuja-header-action:hover,
  .trafficabuja-header-action:focus-visible {
    background: rgba(15, 23, 42, 0.06);
    outline: none;
  }

  .trafficabuja-header-action--about:hover,
  .trafficabuja-header-action--about:focus-visible {
    color: #5865f2;
  }

  .trafficabuja-header-action--about {
    font-family: "Pacifico", cursive;
    font-size: 1.15rem;
    line-height: 1;
  }

  .trafficabuja-header-icon {
    display: inline-flex;
    width: 18px;
    height: 18px;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .trafficabuja-header-icon svg {
    width: 100%;
    height: 100%;
    display: block;
    fill: currentColor;
  }

  @media (max-width: 768px) {
    .trafficabuja-header-shell {
      padding: 0.85rem 2rem 0;
    }

    .trafficabuja-header-inner {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .trafficabuja-header-wordmark {
      flex: 0 1 auto;
      text-align: left;
      font-size: clamp(1.2rem, 6vw, 2rem);
      margin-right: auto;
    }

    .trafficabuja-header-nav {
      gap: 0.6rem;
      width: auto;
      justify-content: flex-end;
      align-self: center;
    }

    .trafficabuja-header-stacked-nav {
      gap: 0.2rem;
    }

    .trafficabuja-header-link-row--primary {
      gap: 0.75rem;
    }

    .trafficabuja-header-link-row--secondary {
      gap: 1rem;
      padding-right: 0;
    }

    .trafficabuja-header-link--primary {
      font-size: 0.84rem;
    }

    .trafficabuja-header-link--secondary {
      font-size: 0.78rem;
    }

    .trafficabuja-header-action {
      min-height: 32px;
      width: 32px;
      min-width: 32px;
      padding: 0.35rem;
      gap: 0;
    }

    .trafficabuja-header-icon {
      width: 14px;
      height: 14px;
    }

    .trafficabuja-header-label {
      display: none;
    }

    .trafficabuja-header-action--about .trafficabuja-header-label {
      display: inline;
    }
  }
</style>

<div class="trafficabuja-header-shell trafficabuja-header-shell--overlay">
  <div class="trafficabuja-header-inner">
    <div class="trafficabuja-header-wordmark" aria-label="trafficabuja brand name">trafficabuja</div>
    <div class="trafficabuja-header-nav-placeholder"></div>
  </div>
</div>
