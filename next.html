<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <!-- Tailwind CSS v4 + Inter Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Framer Motion via ESM (React + ReactDOM required) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Framer Motion UMD (compatible) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Lucide React (for icons) -->
    <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.js"></script>
    <!-- Babel Standalone for JSX compilation in browser (development) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Additional: clsx + class-variance-authority are not needed for runtime, but we'll use inline cn utility -->
    <style>
        /* custom overrides for better card integration and smooth transitions */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background: transparent;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .profile-main {
            width: 100%;
            min-height: 100vh;
            padding: 0;
            overflow: visible;
            background: #fff;
        }
        .timeline-panel {
            width: 100%;
            min-height: 100vh;
            padding: 0;
            background: #fff;
        }
        .timeline-shell {
            width: 100%;
            max-width: none;
            margin: 0;
            border: 0;
            border-radius: 0;
            background: #fff;
            box-shadow: none;
            overflow: visible;
        }
        .timeline-top {
            padding: 0 clamp(24px, 4vw, 72px) 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.95rem;
            flex-wrap: wrap;
        }
        .timeline-body {
            position: relative;
            padding: 0 clamp(26px, 4vw, 72px) 3rem;
        }
        .timeline-track {
            position: relative;
            padding-top: 0;
            padding-bottom: 2rem;
        }
        .timeline-axis {
            position: absolute;
            left: clamp(24px, 3vw, 40px);
            top: 0;
            bottom: 52px;
            width: 2px;
            background: linear-gradient(to bottom, transparent 0%, #e2e8f0 10%, #e2e8f0 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0px, transparent 76px, black 76px);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0px, transparent 76px, black 76px);
            pointer-events: none;
        }
        .timeline-axis-progress {
            position: absolute;
            inset: 0 auto auto 0;
            width: 2px;
            height: 0;
            opacity: 0;
            border-radius: 999px;
            background: linear-gradient(to top, #a855f7 0%, #3b82f6 12%, transparent 100%);
            transition: height 150ms linear, opacity 150ms ease;
        }
        .timeline-entry {
            position: relative;
            display: flex;
            justify-content: flex-start;
            gap: clamp(1rem, 2vw, 2.1rem);
            padding-top: 3.5rem;
        }
        .timeline-marker {
            position: relative;
            display: flex;
            flex-direction: row;
            z-index: 2;
            align-items: center;
            align-self: start;
            max-width: 26rem;
            width: 100%;
            min-height: 40px;
            padding-left: 0;
        }
        .timeline-dot-shell {
            position: absolute;
            left: 12px;
            top: 0;
            width: 40px;
            height: 40px;
            border-radius: 999px;
            background: #fff;
            border: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .timeline-dot {
            width: 16px;
            height: 16px;
            border-radius: 999px;
            background: #e2e8f0;
            border: 1px solid #cbd5e1;
        }
        .timeline-date {
            margin: 0;
            font-size: clamp(2rem, 4.6vw, 4rem);
            line-height: 1.1;
            color: #64748b;
            font-weight: 700;
            letter-spacing: -0.02em;
            padding-left: 5rem;
        }
        .timeline-entry-content {
            position: relative;
            padding: 0;
            width: 100%;
        }
        .next-card-shell {
            width: 100%;
            max-width: 26rem;
        }
        @media (max-width: 980px) {
            .profile-main {
                height: auto;
                padding: 1rem;
                overflow: visible;
            }
            .timeline-panel {
                min-height: auto;
                padding: 0;
            }
            .timeline-shell {
                border-radius: 0;
            }
            .timeline-top {
                padding: 0;
            }
            .timeline-body {
                padding: 0 1rem 1.2rem;
            }
            .timeline-axis {
                left: 14px;
                top: 0;
                bottom: 52px;
                mask-image: none;
                -webkit-mask-image: none;
            }
            .timeline-entry {
                display: block;
                grid-template-columns: 1fr;
                gap: 0.85rem;
                padding: 2.4rem 0 1.6rem;
                padding-left: 0;
            }
            .timeline-marker {
                position: relative;
                top: auto;
                max-width: none;
                min-height: 32px;
            }
            .timeline-dot-shell {
                left: 0;
                top: 1px;
                width: 30px;
                height: 30px;
            }
            .timeline-dot {
                width: 12px;
                height: 12px;
            }
            .timeline-date {
                font-size: 2rem;
                padding-left: 2.85rem;
            }
            .timeline-entry-content {
                padding-left: 2.85rem;
                padding-right: 0;
            }
            .timeline-track > .timeline-entry:first-of-type {
                padding-top: 0;
            }
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        /* for smooth framer motion */
        .will-change-transform {
            will-change: transform;
        }
    </style>
    <style>
        /* override any default anchor style */
        a {
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="antialiased">

<main class="profile-main">
    <section class="timeline-panel" id="timelinePanel" aria-label="Proposal timeline">
        <div class="timeline-shell">
            <div class="timeline-top"></div>
            <div class="timeline-body">
                <div class="timeline-track" id="timelineTrack">
                    <div class="timeline-axis" aria-hidden="true">
                        <div class="timeline-axis-progress" id="timelineAxisProgress"></div>
                    </div>
                    <article class="timeline-entry">
                        <div class="timeline-marker">
                            <span class="timeline-dot-shell" aria-hidden="true"><span class="timeline-dot"></span></span>
                            <h3 class="timeline-date">1st Ave, Gwarinpa</h3>
                        </div>
                        <div class="timeline-entry-content">
                            <div id="root" class="next-card-shell"></div>
                        </div>
                    </article>
                </div>
            </div>
        </div>
    </section>
</main>

<script type="text/babel" data-presets="react">
    // ============================================================
    // Utility Functions (cn utility for merging classes)
    // ============================================================
    function cn(...inputs) {
        return inputs.filter(Boolean).join(' ');
    }

    // ============================================================
    // Shadcn like Badge Component
    // ============================================================
    function Badge({ children, className, variant = "outline", ...props }) {
        const variantClasses = {
            default: "border-transparent bg-primary text-primary-foreground hover:bg-primary/80",
            secondary: "border-transparent bg-secondary text-secondary-foreground hover:bg-secondary/80",
            destructive: "border-transparent bg-destructive text-destructive-foreground hover:bg-destructive/80",
            outline: "border-gray-300 bg-white text-gray-700 hover:bg-gray-50"
        };
        const base = "inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold transition-colors focus:outline-none";
        // custom orange override for demo badge: they used specific orange style
        if (className && className.includes("border-orange")) {
            return <span className={cn(base, className)} {...props}>{children}</span>;
        }
        return (
            <span className={cn(base, variantClasses[variant] || variantClasses.outline, className)} {...props}>
                {children}
            </span>
        );
    }

    // ============================================================
    // Shadcn Button Component
    // ============================================================
    function Button({ children, className, size = "default", variant = "default", ...props }) {
        const sizeClasses = {
            default: "h-10 px-4 py-2",
            sm: "h-9 rounded-md px-3",
            lg: "h-11 rounded-md px-8",
            icon: "h-10 w-10"
        };
        const variantClasses = {
            default: "bg-primary text-primary-foreground hover:bg-primary/90 shadow-sm",
            destructive: "bg-destructive text-destructive-foreground hover:bg-destructive/90",
            outline: "border border-input bg-background hover:bg-accent hover:text-accent-foreground",
            secondary: "bg-secondary text-secondary-foreground hover:bg-secondary/80",
            ghost: "hover:bg-accent hover:text-accent-foreground",
            link: "text-primary underline-offset-4 hover:underline"
        };
        return (
            <button
                className={cn(
                    "inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50",
                    sizeClasses[size],
                    variantClasses[variant],
                    className
                )}
                {...props}
            >
                {children}
            </button>
        );
    }

    // ============================================================
    // Card Components (Header, Content, Card)
    // ============================================================
    function Card({ children, className, ...props }) {
        return (
            <div className={cn("rounded-lg bg-transparent text-card-foreground shadow-none", className)} {...props}>
                {children}
            </div>
        );
    }
    function CardHeader({ children, className, ...props }) {
        return <div className={cn("flex flex-col space-y-1.5 p-6", className)} {...props}>{children}</div>;
    }
    function CardContent({ children, className, ...props }) {
        return <div className={cn("p-6 pt-0", className)} {...props}>{children}</div>;
    }
    
    // ============================================================
    // Checkbox Component (Radix-style but pure functional)
    // ============================================================
    function Checkbox({ id, className, checked, onCheckedChange, disabled, ...props }) {
        const [internalChecked, setInternalChecked] = React.useState(checked || false);
        const isControlled = checked !== undefined;
        const isChecked = isControlled ? checked : internalChecked;
        
        const handleToggle = () => {
            if (disabled) return;
            const newValue = !isChecked;
            if (!isControlled) setInternalChecked(newValue);
            if (onCheckedChange) onCheckedChange(newValue);
        };
        
        return (
            <button
                type="button"
                role="checkbox"
                aria-checked={isChecked}
                disabled={disabled}
                onClick={handleToggle}
                className={cn(
                    "peer h-4 w-4 shrink-0 rounded border border-gray-300 bg-white shadow-sm transition-all outline-none focus-visible:ring-[3px] focus-visible:ring-indigo-200 cursor-pointer disabled:cursor-not-allowed disabled:opacity-50 flex items-center justify-center",
                    isChecked && "border-indigo-600 bg-indigo-600 text-white",
                    className
                )}
                {...props}
            >
                {isChecked && (
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        strokeWidth="2.5"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        className="text-white"
                    >
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                )}
            </button>
        );
    }
    
    function Label({ children, htmlFor, className, ...props }) {
        return <label htmlFor={htmlFor} className={cn("text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 cursor-pointer", className)} {...props}>{children}</label>;
    }

    // ============================================================
    // Framer Motion Integration (using global framer-motion)
    // ============================================================
    const { motion } = window.FramerMotion || {};
    // Fallback in case framer-motion is not fully attached: create dummy motion
    const MotionDiv = motion?.div || (({children, ...rest}) => <div {...rest}>{children}</div>);
    const MotionUl = motion?.ul || (({children, ...rest}) => <ul {...rest}>{children}</ul>);
    const MotionLi = motion?.li || (({children, ...rest}) => <li {...rest}>{children}</li>);
    
    // ============================================================
    // Helper: getStatusAttributes (icons, line colors)
    // ============================================================
    // dynamic icon mapping: we use lucide icons by constructing from Lucide global or simple svg fallback.
    const getIconElement = (iconName, className) => {
        // check if window.lucide and Lucide icons exist; but we'll manually provide needed icons via svg.
        // Simpler: return JSX for each icon 
        const iconProps = { className: cn("h-5 w-5", className), strokeWidth: 1.75 };
        switch(iconName) {
            case 'CheckCircle2': return <svg {...iconProps} viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>;
            case 'Pencil': return <svg {...iconProps} viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 3l4 4-7 7H10v-4l7-7z" /><path d="M4 20l4-4" /></svg>;
            case 'FileText': return <svg {...iconProps} viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></svg>;
            case 'AlertCircle': return <svg {...iconProps} viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
            default: return <svg {...iconProps} viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/></svg>;
        }
    };
    
    const getStatusAttributes = (status) => {
        switch (status) {
            case "completed": return { iconName: "CheckCircle2", iconClassName: "text-green-500", lineClassName: "bg-green-500" };
            case "active": return { iconName: "Pencil", iconClassName: "text-primary", lineClassName: "bg-border" };
            case "pending": return { iconName: "FileText", iconClassName: "text-muted-foreground", lineClassName: "bg-border" };
            case "error": return { iconName: "AlertCircle", iconClassName: "text-destructive", lineClassName: "bg-border" };
            default: return { iconName: "Circle", iconClassName: "text-muted-foreground", lineClassName: "bg-border" };
        }
    };
    
    // ============================================================
    // MAIN PROPOSAL TRACKER CARD COMPONENT
    // ============================================================
    const ProposalTrackerCard = ({ imageUrl, status, title, price, steps, buttonText }) => {
        const [acceptedTerms, setAcceptedTerms] = React.useState(false);
        const containerVariants = {
            hidden: { opacity: 0 },
            visible: { opacity: 1, transition: { staggerChildren: 0.15 } }
        };
        const itemVariants = {
            hidden: { opacity: 0, y: 20 },
            visible: { opacity: 1, y: 0, transition: { type: "spring", stiffness: 100, damping: 12 } }
        };
        
        return (
            <Card className="w-full max-w-sm overflow-hidden rounded-2xl border-none bg-transparent text-card-foreground shadow-none transition-all duration-300">
                <CardHeader className="p-0">
                    <div className="flex items-start gap-4 px-6 pb-1 pt-0">
                        <div className="relative h-24 w-24 flex-shrink-0 rounded-lg overflow-hidden shadow-md">
                            <img src={imageUrl} alt={title} className="h-full w-full object-cover" />
                        </div>
                        <div className="flex flex-col">
                            <Badge variant="outline" className="mb-2 w-fit border-orange-300 bg-orange-50 text-orange-600">
                                {status}
                            </Badge>
                            <h2 className="text-xl font-bold text-gray-900">{title}</h2>
                            <p className="mt-1 text-2xl font-semibold text-gray-900">
                                ${price.toLocaleString("en-US", { minimumFractionDigits: 2 })}
                            </p>
                            <p className="text-xs font-medium uppercase text-gray-500 tracking-wide">
                                Total Budget
                            </p>
                        </div>
                    </div>
                </CardHeader>
                <CardContent className="space-y-2 px-6 pb-6">
                    <MotionUl className="relative space-y-2" variants={containerVariants} initial="hidden" animate="visible">
                        {steps.map((step, idx) => {
                            const { iconName, iconClassName, lineClassName } = getStatusAttributes(step.status);
                            const isLast = idx === steps.length - 1;
                            return (
                                <MotionLi key={idx} className="flex items-start gap-4" variants={itemVariants}>
                                    <div className="relative flex flex-col items-center">
                                        <div className="z-10 mt-1 flex h-8 w-8 items-center justify-center rounded-full bg-white border border-gray-100 shadow-sm">
                                            {getIconElement(iconName, cn("h-4.5 w-4.5", iconClassName))}
                                        </div>
                                        {!isLast && (
                                            <div className={cn("absolute top-9 h-[calc(100%-1.25rem)] w-0.5", lineClassName, "bg-gray-200")} style={{ backgroundColor: lineClassName === 'bg-green-500' ? '#22c55e' : '#e2e8f0' }} />
                                        )}
                                    </div>
                                    <div className="flex-1 pb-5 pt-1.5">
                                        {step.date && <p className="text-xs text-gray-500">{step.date}</p>}
                                        <p className="font-semibold text-gray-800">{step.title}</p>
                                        <a href="#" className="text-sm font-medium text-indigo-600 hover:text-indigo-800 hover:underline inline-flex items-center gap-0.5">
                                            {step.description}
                                        </a>
                                    </div>
                                </MotionLi>
                            );
                        })}
                    </MotionUl>
                    
                    <Button
                        size="lg"
                        disabled={!acceptedTerms}
                        className={cn(
                            "w-full rounded-lg text-base font-semibold transition-all shadow-md",
                            acceptedTerms
                                ? "bg-indigo-600 hover:bg-indigo-700"
                                : "bg-indigo-300 hover:bg-indigo-300"
                        )}
                    >
                        {buttonText}
                    </Button>
                    
                    {/* CHECKBOX SECTION - exactly under manage proposal button as requested */}
                    <div className="mt-3">
                        <div className="flex items-center gap-3">
                            <Checkbox id="terms-checkbox" checked={acceptedTerms} onCheckedChange={setAcceptedTerms} />
                            <Label htmlFor="terms-checkbox" className="text-sm font-medium text-gray-700 cursor-pointer select-none">
                                <span>Accept </span>
                                <a
                                    href="#"
                                    onClick={(event) => {
                                        event.preventDefault();
                                        event.stopPropagation();
                                    }}
                                    className="text-indigo-600 hover:text-indigo-800 hover:underline"
                                >
                                    terms and conditions
                                </a>
                            </Label>
                        </div>
                    </div>
                </CardContent>
            </Card>
        );
    };
    
    // ============================================================
    // Demo data and main app
    // ============================================================
    const DemoApp = () => {
        const stepsData = [
            { title: "Manage Documents", description: "View & Send Documents", status: "active", icon: "FileText" },
            { title: "Contracts", description: "See Contract Template", status: "pending", icon: "Pencil" },
            { title: "Credit Assessment Approved", description: "View Details", date: "10th January, 10:40", status: "completed", icon: "CheckCircle2" },
            { title: "Proposal Sent", description: "View proposal", date: "12th January, 13:24", status: "completed", icon: "CheckCircle2" },
        ];
        
        const proposal = {
            imageUrl: "https://images.unsplash.com/photo-1540518614846-7eded433c457?w=400&h=300&fit=crop",
            status: "Awaiting Documents",
            title: "1st Ave, Gwarinpa",
            price: 39550.00,
            buttonText: "Submit",
            steps: stepsData
        };
        
        return (
            <ProposalTrackerCard
                imageUrl={proposal.imageUrl}
                status={proposal.status}
                title={proposal.title}
                price={proposal.price}
                steps={proposal.steps}
                buttonText={proposal.buttonText}
            />
        );
    };
    
    // Render to root
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot ? ReactDOM.createRoot(rootElement) : (ReactDOM.render(React.createElement(DemoApp), rootElement));
    if (rootElement && ReactDOM.createRoot) {
        root.render(React.createElement(DemoApp));
    } else if (rootElement) {
        ReactDOM.render(React.createElement(DemoApp), rootElement);
    }

    (function () {
        var timelinePanel = document.getElementById("timelinePanel");
        var timelineTrack = document.getElementById("timelineTrack");
        var timelineAxisProgress = document.getElementById("timelineAxisProgress");

        function updateTimelineProgress() {
            if (!timelinePanel || !timelineTrack || !timelineAxisProgress) return;

            var rect = timelineTrack.getBoundingClientRect();
            var viewportHeight = window.innerHeight || document.documentElement.clientHeight;
            var visible = Math.min(Math.max(viewportHeight * 0.52 - rect.top, 0), rect.height);
            var progress = rect.height > 0 ? visible / rect.height : 0;

            timelineAxisProgress.style.height = progress * 100 + "%";
            timelineAxisProgress.style.opacity = progress > 0.04 ? "1" : "0";
        }

        window.addEventListener("scroll", updateTimelineProgress, { passive: true });
        window.addEventListener("resize", updateTimelineProgress);
        updateTimelineProgress();
    })();
</script>
</body>
</html>
